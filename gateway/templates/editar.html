<!DOCTYPE html>
<html>

<head>
    <title>SISEPI - Gestionar Casos</title>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }

        .header {
            background: #1a73e8;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .nav {
            background: white;
            padding: 10px;
            text-align: center;
        }

        .nav a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }

        .form-card,
        .table-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            padding: 10px;
            margin: 5px;
        }

        input {
            width: calc(100% - 20px);
            margin: 10px 0;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1557b0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #1a73e8;
            color: white;
        }

        .edit-btn {
            background: #ff9800;
        }

        .delete-btn {
            background: #f44336;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>SISEPI - Gestión de Casos</h1>
    </div>
    <div class="nav"><a href="/">Dashboard</a><a href="/editar">Gestionar</a><a href="/graficas">Gráficas</a></div>
    <div class="container">
        <div class="form-card">
            <h2>Registrar Nuevo Caso</h2>
            <input type="text" id="nombre" placeholder="Nombre"><br>
            <input type="number" id="edad" placeholder="Edad"><br>
            <select id="sexo">
                <option>M</option>
                <option>F</option>
            </select>
            <select id="municipio">
                <option>La Paz</option>
                <option>Los Cabos</option>
                <option>Comondú</option>
                <option>Mulegé</option>
                <option>Loreto</option>
            </select>
            <input type="text" id="enfermedad" placeholder="Enfermedad"><br>
            <select id="tipo">
                <option>Sospechoso</option>
                <option>Confirmado</option>
                <option>Descartado</option>
            </select>
            <select id="estado">
                <option>Activo</option>
                <option>Recuperado</option>
                <option>Fallecido</option>
            </select>
            <button onclick="crearCaso()">Registrar Caso</button>
        </div>
        <div class="table-card">
            <h2>Lista de Casos</h2>
            <table id="casos-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Municipio</th>
                        <th>Enfermedad</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="casos-body"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function loadCasos() {
            const res = await fetch('/api/casos');
            const casos = await res.json();
            document.getElementById('casos-body').innerHTML = casos.map(c => `
                <tr>
                    <td>${c.id}</td><td>${c.nombre}</td><td>${c.edad}</td>
                    <td>${c.municipio}</td><td>${c.enfermedad}</td><td>${c.tipo}</td>
                    <td>${c.estado}</td>
                    <td><button class="edit-btn" onclick="editarCaso(${c.id})">Editar</button>
                    <button class="delete-btn" onclick="eliminarCaso(${c.id})">Eliminar</button></td>
                </tr>
            `).join('');
        }
        async function crearCaso() {
            const data = {
                nombre: document.getElementById('nombre').value,
                edad: parseInt(document.getElementById('edad').value),
                sexo: document.getElementById('sexo').value,
                municipio: document.getElementById('municipio').value,
                enfermedad: document.getElementById('enfermedad').value,
                tipo: document.getElementById('tipo').value,
                estado: document.getElementById('estado').value
            };
            await fetch('/api/casos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            loadCasos();
        }
        async function editarCaso(id) {
            const nuevoEstado = prompt('Nuevo estado (Activo/Recuperado/Fallecido):');
            if (nuevoEstado) await fetch(`/api/casos/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ estado: nuevoEstado }) });
            loadCasos();
        }
        async function eliminarCaso(id) {
            if (confirm('¿Eliminar este caso?')) await fetch(`/api/casos/${id}`, { method: 'DELETE' });
            loadCasos();
        }
        loadCasos();
    </script>
</body>

</html>
