<!DOCTYPE html>
<html>

<head>
    <title>SISEPI - Gráficas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
        }

        .header {
            background: #1a73e8;
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .nav {
            background: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .nav a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        canvas {
            max-height: 400px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>SISEPI - Estadísticas Gráficas</h1>
    </div>
    <div class="nav"><a href="/">Dashboard</a><a href="/editar">Gestionar</a><a href="/graficas">Gráficas</a></div>
    <div class="container">
        <canvas id="chart"></canvas>
    </div>
    <script>
        async function loadChart() {
            const res = await fetch('/api/datos-enfermedades');
            const data = await res.json();
            new Chart(document.getElementById('chart'), {
                type: 'bar',
                data: { labels: data.enfermedades, datasets: [{ label: 'Número de Casos', data: data.cantidades, backgroundColor: '#1a73e8' }] },
                options: { responsive: true, plugins: { legend: { position: 'top' } } }
            });
        }
        loadChart();
    </script>
</body>

</html>
